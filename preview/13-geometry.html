<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Geometry · Motifs</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 24px 28px; gap: 14px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; flex: 1; align-items: stretch; }
  .frame { background: var(--mio-white); border: 1px solid var(--line); border-radius: 14px; padding: 16px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; gap: 10px; min-height: 200px; }
  .frame img, .frame svg { max-width: 80%; max-height: 130px; }
  .name { font-family: var(--font-display); font-size: 14px; color: var(--fg); }
  .desc { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); text-align: center; letter-spacing: 0.04em; }
</style></head>
<body>
<div class="card">
  <div class="row between center-x">
    <div class="label">Geometry · The Brand's Entire Shape Vocabulary</div>
    <div class="mono">don't introduce new shapes</div>
  </div>
  <div class="grid">
    <div class="frame">
      <img src="../assets/graphics/seven_fan_outline.svg" alt="">
      <div class="col gap-2 center-x" style="align-items:center;"><span class="name">"7" Fan</span><span class="desc">odd-count blade rhythm</span></div>
    </div>
    <div class="frame">
      <img src="../assets/graphics/seven_diamond_outline.svg" alt="">
      <div class="col gap-2 center-x" style="align-items:center;"><span class="name">"7" Diamond</span><span class="desc">mirrored two-tone</span></div>
    </div>
    <div class="frame">
      <img src="../assets/graphics/aux_chevron_outline.svg" alt="">
      <div class="col gap-2 center-x" style="align-items:center;"><span class="name">"X" Chevron</span><span class="desc">crossed lozenges · divider</span></div>
    </div>
  </div>
</div>
</body></html>
