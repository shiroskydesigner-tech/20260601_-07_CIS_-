<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Type · Signature Tracking</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 28px 32px; gap: 18px; }
  .ex { font-family: var(--font-display); font-weight: 400; line-height: 1; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); letter-spacing: 0.04em; }
  .block { padding: 16px 20px; border: 1px solid var(--line); border-radius: 12px; background: var(--bg-elev-1); display: flex; flex-direction: column; gap: 6px; }
</style></head>
<body>
<div class="card">
  <div class="label">Signature Letter-Spacing · Latin Caps</div>
  <div class="block">
    <div class="ex" style="font-size:34px; letter-spacing:0.18em;">M I O 7</div>
    <div class="meta">tracking-airy · 0.18em — wordmark</div>
  </div>
  <div class="block">
    <div class="ex" style="font-size:22px; letter-spacing:0.32em;">A L W A Y S&nbsp; O N&nbsp; Y O U R&nbsp; M I N D</div>
    <div class="meta">tracking-wide · 0.32em — tagline</div>
  </div>
  <div class="block">
    <div class="ex" style="font-size:18px; font-family:var(--font-cjk); letter-spacing:0.45em;">澪&nbsp;柒</div>
    <div class="meta">tracking-ultra · 0.45em — CJK ceremonial</div>
  </div>
</div>
</body></html>
