<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Navbar · Frosted</title>
<link rel="stylesheet" href="_base.css">
<style>
  html, body { height: 100%; }
  body { background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23B8B4C6'/></svg>"); background-size: cover; }
  .frame {
    box-sizing: border-box;
    min-height: 100vh;
    background:
      radial-gradient(120% 70% at 30% 0%, #E6D8E9 0%, transparent 60%),
      radial-gradient(110% 80% at 80% 100%, #9A95AB 0%, transparent 50%),
      linear-gradient(135deg, #B8B4C6 0%, #9A95AB 100%);
    padding: 16px;
    display: flex; flex-direction: column; gap: 28px;
  }
  .navbar {
    height: 56px; border-radius: 999px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background: rgba(246, 247, 249, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.5);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
  }
  .wm { font-family: var(--font-display); font-size: 15px; letter-spacing: 0.18em; color: var(--mio-deep-gray); }
  .nav { display: flex; gap: 28px; font-family: var(--font-display); font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--mio-purple-700); }
  .nav a { color: inherit; border: none; transition: opacity 240ms; }
  .nav a:hover { opacity: 0.55; }
  .cta {
    height: 36px; padding: 0 18px; border-radius: 999px;
    font-family: var(--font-display); font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    background: var(--mio-deep-gray); color: var(--mio-white); border: none;
  }
  .caption { font-family: var(--font-mono); font-size: 10.5px; color: rgba(58,58,63,0.6); padding: 0 12px; }
</style></head>
<body>
<div class="frame">
  <div class="navbar">
    <div class="wm">M I O 7</div>
    <div class="nav">
      <a href="#">Menu</a>
      <a href="#">Stores</a>
      <a href="#">Story</a>
      <a href="#">Journal</a>
    </div>
    <button class="cta">Order</button>
  </div>
  <div class="caption">Frosted navbar · backdrop-filter blur(20px) · 55% white over misty background</div>
</div>
</body></html>
