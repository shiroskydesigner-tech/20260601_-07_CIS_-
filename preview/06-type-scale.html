<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Type · Scale</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { gap: 10px; padding: 26px 32px; }
  .row { display: grid; grid-template-columns: 90px 1fr 220px; align-items: baseline; gap: 24px; }
  .tag { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.06em; color: var(--fg-muted); text-transform: uppercase; }
  .spec { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-muted); }
  .display { font-family: var(--font-display); font-weight: 300; line-height: 1.05; color: var(--fg); }
  .ui-sans { font-family: var(--font-ui); }
</style></head>
<body>
<div class="card">
  <div class="label">Type Scale · Latin</div>
  <div class="row"><span class="tag">Display</span><span class="display" style="font-size:64px;">Mio7</span><span class="spec">64 / Cormorant 300 / 0.04em</span></div>
  <div class="row"><span class="tag">H1</span><span class="display" style="font-size:44px; font-weight:400;">Seven base teas</span><span class="spec">44 / Cormorant 400 / 0.02em</span></div>
  <div class="row"><span class="tag">H2</span><span class="display" style="font-size:30px; font-weight:400;">A quiet brew</span><span class="spec">30 / Cormorant 400</span></div>
  <div class="row"><span class="tag">H3</span><span class="ui-sans" style="font-size:22px; font-weight:500; letter-spacing:-0.01em;">Honey Drift Oolong</span><span class="spec">22 / Inter 500 / -0.01em</span></div>
  <div class="row"><span class="tag">Body</span><span class="ui-sans" style="font-size:16px; line-height:1.55;">Pure tea. Perfectly balanced.</span><span class="spec">16 / Inter 400 / 1.55</span></div>
  <div class="row"><span class="tag">Caption</span><span class="ui-sans" style="font-size:12px; color:var(--fg-muted);">Always on your mind</span><span class="spec">12 / Inter 400</span></div>
</div>
</body></html>
