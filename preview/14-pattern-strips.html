<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Pattern · Rows</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { background: var(--mio-white); }
  .card { padding: 22px 28px; gap: 12px; }
  .strip { background: var(--mio-white); border: 1px solid var(--line); border-radius: 14px; padding: 18px 20px; display: flex; flex-direction: column; gap: 8px; }
  .strip img { width: 100%; height: 80px; object-fit: contain; object-position: left center; }
  .cap { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-muted); letter-spacing: 0.04em; }
</style></head>
<body>
<div class="card">
  <div class="label">Auxiliary Pattern Strips</div>
  <div class="strip">
    <img src="../assets/graphics/sevens_row.svg" alt="">
    <span class="cap">sevens_row.svg — first blade filled (accent), remaining seven outlined</span>
  </div>
  <div class="strip">
    <img src="../assets/graphics/zeroes_row.svg" alt="">
    <span class="cap">zeroes_row.svg — first capsule filled (accent), remaining seven outlined</span>
  </div>
</div>
</body></html>
