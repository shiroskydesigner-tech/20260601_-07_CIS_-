<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Voice & Tone</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 22px 28px; gap: 14px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; flex: 1; }
  .box { border: 1px solid var(--line); border-radius: 14px; padding: 18px 20px; background: var(--bg-elev-1); display: flex; flex-direction: column; gap: 10px; }
  .box.do  { background: rgba(212, 255, 106, 0.10); border-color: rgba(166, 200, 70, 0.4); }
  .box.dont { background: rgba(255, 130, 130, 0.06); border-color: rgba(180, 80, 80, 0.25); }
  .tag { font-family: var(--font-display); font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase; }
  .do .tag  { color: #51711F; }
  .dont .tag { color: #9B3030; }
  .ex { font-family: var(--font-cjk); font-size: 15px; line-height: 1.65; color: var(--fg); }
  .ex.en { font-family: var(--font-display); font-style: italic; font-size: 16px; color: var(--fg-muted); }
</style></head>
<body>
<div class="card">
  <div class="label">Voice · Atmospheric over declarative</div>
  <div class="grid">
    <div class="box do">
      <span class="tag">Reach for</span>
      <div class="ex">蜜境烏龍 — 天然蜜甜，茶韻柔軟，漂浮蜜夢。</div>
      <div class="ex en">HONEY DRIFT — a soft, lingering finish.</div>
    </div>
    <div class="box dont">
      <span class="tag">Avoid</span>
      <div class="ex">超好喝蜜香烏龍！必喝必點，今日限時 8 折！</div>
      <div class="ex en">Try our amazing honey-fragrance oolong now!</div>
    </div>
  </div>
</div>
</body></html>
