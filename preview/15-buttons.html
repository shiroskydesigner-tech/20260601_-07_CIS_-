<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { gap: 16px; padding: 24px 28px; }
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    height: 44px; padding: 0 28px; border-radius: 999px;
    font-family: var(--font-display); font-size: 14px; letter-spacing: 0.22em; text-transform: uppercase;
    border: 1px solid transparent; cursor: pointer;
    transition: all 240ms cubic-bezier(0.32, 0.72, 0.27, 1);
  }
  .btn.primary { background: var(--mio-misty-purple); color: var(--mio-white); }
  .btn.primary:hover { background: #9A95AB; }
  .btn.ghost { background: transparent; color: var(--mio-deep-gray); border-color: rgba(58,58,63,0.22); }
  .btn.ghost:hover { background: var(--mio-soft-lavender); border-color: transparent; }
  .btn.dark { background: var(--mio-deep-gray); color: var(--mio-white); }
  .btn.cool { background: var(--mio-cool-blue); color: var(--mio-deep-gray); }
  .btn.sm { height: 32px; padding: 0 18px; font-size: 11px; }
  .btn.lg { height: 56px; padding: 0 40px; font-size: 14px; }
  .row { gap: 12px; flex-wrap: wrap; align-items: center; }
  .grp { display: flex; flex-direction: column; gap: 8px; }
  .tag { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-muted); letter-spacing: 0.04em; }
</style></head>
<body>
<div class="card">
  <div class="label">Buttons · Pill (echoes "0" capsule)</div>
  <div class="grp">
    <span class="tag">primary / ghost / dark / accent</span>
    <div class="row">
      <button class="btn primary">Order now</button>
      <button class="btn ghost">Find a store</button>
      <button class="btn dark">Sign in</button>
      <button class="btn cool">Limited drop</button>
    </div>
  </div>
  <div class="grp">
    <span class="tag">size · sm / default / lg</span>
    <div class="row">
      <button class="btn primary sm">Add</button>
      <button class="btn primary">Add to cart</button>
      <button class="btn primary lg">Add to cart</button>
    </div>
  </div>
  <div class="grp">
    <span class="tag">disabled</span>
    <div class="row">
      <button class="btn primary" style="opacity:.4; cursor:not-allowed;" disabled>Sold out</button>
      <button class="btn ghost" style="opacity:.4; cursor:not-allowed;" disabled>Coming soon</button>
    </div>
  </div>
</div>
</body></html>
