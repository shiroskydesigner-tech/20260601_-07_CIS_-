<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { background: var(--mio-white); }
  .card { gap: 14px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; flex: 1; padding: 14px 6px; align-items: center; }
  .ti { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .swatch { width: 100%; aspect-ratio: 1.4 / 1; background: #FFF; border-radius: 14px; border: 1px solid var(--line-soft); }
  .ti .name { font-family: var(--font-display); font-size: 14px; }
  .ti .spec { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); text-align: center; }
  .s1 { box-shadow: 0 1px 2px rgba(58,58,63,.04), 0 1px 1px rgba(58,58,63,.02); }
  .s2 { box-shadow: 0 6px 16px rgba(58,58,63,.06), 0 2px 4px rgba(58,58,63,.03); }
  .s3 { box-shadow: 0 18px 40px rgba(94,88,114,.10), 0 6px 12px rgba(94,88,114,.05); }
  .haze { box-shadow: 0 30px 80px rgba(184,180,198,.45); }
</style></head>
<body>
<div class="card">
  <div class="row between center-x">
    <div class="label">Elevation · Hazy, Low-Opacity</div>
    <div class="mono">never harsh — slightly purple-tinted</div>
  </div>
  <div class="grid">
    <div class="ti"><div class="swatch s1"></div><span class="name">--shadow-1</span><span class="spec">subtle press / hairline</span></div>
    <div class="ti"><div class="swatch s2"></div><span class="name">--shadow-2</span><span class="spec">default card</span></div>
    <div class="ti"><div class="swatch s3"></div><span class="name">--shadow-3</span><span class="spec">modal / floating panel</span></div>
    <div class="ti"><div class="swatch haze"></div><span class="name">--shadow-haze</span><span class="spec">hero brand glow</span></div>
  </div>
</div>
</body></html>
