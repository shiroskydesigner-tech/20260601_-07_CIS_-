<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>The Seven Base Teas</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 22px 28px; gap: 14px; }
  .table { display: grid; grid-template-columns: 60px 1fr 1fr 1fr; gap: 4px 18px; }
  .table .h { font-family: var(--font-display); font-size: 10.5px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--fg-muted); padding-bottom: 6px; border-bottom: 1px solid var(--line); }
  .table .num { font-family: var(--font-cjk); font-size: 17px; letter-spacing: 0.3em; color: var(--mio-purple-500); padding: 9px 0; }
  .table .zh { font-family: var(--font-cjk); font-size: 15px; padding: 9px 0; }
  .table .en { font-family: var(--font-display); font-size: 12px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--mio-purple-700); padding: 11px 0 7px; }
  .table .tea { font-family: var(--font-cjk); font-size: 12.5px; color: var(--fg-muted); padding: 11px 0 7px; }
  .row-line { grid-column: 1 / -1; height: 1px; background: var(--line-soft); }
</style></head>
<body>
<div class="card">
  <div class="row between center-x">
    <div class="label">The 7 Base Teas · 澪·序列</div>
    <div class="mono">canonical names — use exactly</div>
  </div>
  <div class="table">
    <span class="h">序</span><span class="h">命名</span><span class="h">English</span><span class="h">茶種</span>
    <span class="num">壹</span><span class="zh">初雪冬片</span><span class="en">First Frost</span><span class="tea">冬片四季春</span>
    <span class="num">貳</span><span class="zh">金萱霧語</span><span class="en">Mist Oolong</span><span class="tea">茉莉金萱</span>
    <span class="num">參</span><span class="zh">凍頂冷焰</span><span class="en">Cold Flame</span><span class="tea">凍頂烏龍</span>
    <span class="num">肆</span><span class="zh">蜜境烏龍</span><span class="en">Honey Drift</span><span class="tea">蜜香烏龍</span>
    <span class="num">伍</span><span class="zh">肯亞赤道</span><span class="en">Equator Red</span><span class="tea">肯亞紅茶</span>
    <span class="num">陸</span><span class="zh">鐵音玄境</span><span class="en">Iron Echo</span><span class="tea">鐵觀音</span>
    <span class="num">柒</span><span class="zh">桂香蕎語</span><span class="en">Osmanthus Buckwheat</span><span class="tea">桂花蕎麥茶</span>
  </div>
</div>
</body></html>
