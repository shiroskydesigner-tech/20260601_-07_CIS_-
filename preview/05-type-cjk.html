<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Type · CJK</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { gap: 18px; justify-content: space-between; }
  .cjk-display {
    font-family: var(--font-cjk);
    font-size: 56px;
    font-weight: 300;
    letter-spacing: 0.15em;
    line-height: 1.1;
  }
  .cjk-serif {
    font-family: var(--font-cjk);
    font-size: 40px;
    font-weight: 400;
    letter-spacing: 0.45em;
    line-height: 1.2;
  }
  .cjk-body { font-family: var(--font-cjk); font-size: 16px; line-height: 1.7; color: var(--fg); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); letter-spacing: 0.04em; }
</style></head>
<body>
<div class="card">
  <div class="label">CJK · Source Han Sans TC <span style="opacity:0.6">(思源黑體 · brand OTFs in /fonts)</span></div>
  <div class="col gap-2">
    <div class="cjk-display">想喝的時候，就會想到</div>
    <div class="meta">Source Han Sans TC · 56 · 300 · tracking 0.15em — slogan</div>
  </div>
  <div class="col gap-2">
    <div class="cjk-serif">澪 · 柒</div>
    <div class="meta">Source Han Sans TC · 40 · tracking 0.45em — ceremonial / packaging</div>
  </div>
  <div class="col gap-2">
    <div class="cjk-body">純粹的好茶，剛剛好的比例，成為你日常裡最剛好的那一杯。</div>
    <div class="meta">Source Han Sans TC · 16 · 400 · line-height 1.7 — body</div>
  </div>
</div>
</body></html>
