<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Tonal scale</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { gap: 18px; }
  .row-scale { display: grid; grid-template-columns: 60px repeat(9, 1fr); gap: 4px; }
  .row-scale .lbl { display: flex; align-items: center; font-family: var(--font-display); font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--fg-muted); }
  .step { aspect-ratio: 1 / 1.05; border-radius: 10px; display: flex; align-items: flex-end; padding: 6px 7px; }
  .step .num { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.04em; }
  .light .num { color: var(--mio-deep-gray); opacity:0.7; }
  .dark .num { color: var(--mio-white); opacity:0.9; }
</style></head>
<body>
<div class="card">
  <div class="row between center-x">
    <div class="label">Tonal Scale · Purple + Gray</div>
    <div class="mono">9-step ramps · 300 = brand primary · 700 = body text</div>
  </div>
  <div class="row-scale">
    <div class="lbl">Purple</div>
    <div class="step light" style="background:#F3F1F6"><span class="num">50</span></div>
    <div class="step light" style="background:#E7E3EE"><span class="num">100</span></div>
    <div class="step light" style="background:#D6D0DF"><span class="num">200</span></div>
    <div class="step light" style="background:#B8B4C6; box-shadow: inset 0 0 0 2px var(--mio-deep-gray)"><span class="num">300</span></div>
    <div class="step light" style="background:#9A95AB"><span class="num">400</span></div>
    <div class="step dark" style="background:#7C7691"><span class="num">500</span></div>
    <div class="step dark" style="background:#5E5872"><span class="num">600</span></div>
    <div class="step dark" style="background:#423E51"><span class="num">700</span></div>
    <div class="step dark" style="background:#2C2935"><span class="num">800</span></div>
    <div class="step dark" style="background:#1A1820"><span class="num">900</span></div>
  </div>
  <div class="row-scale">
    <div class="lbl">Gray</div>
    <div class="step light" style="background:#F6F7F9"><span class="num">50</span></div>
    <div class="step light" style="background:#ECEDF1"><span class="num">100</span></div>
    <div class="step light" style="background:#D9DBE3"><span class="num">200</span></div>
    <div class="step light" style="background:#B8BAC4"><span class="num">300</span></div>
    <div class="step dark" style="background:#8A8C97"><span class="num">400</span></div>
    <div class="step dark" style="background:#5F616B"><span class="num">500</span></div>
    <div class="step dark" style="background:#46474F"><span class="num">600</span></div>
    <div class="step dark" style="background:#3A3A3F; box-shadow: inset 0 0 0 2px var(--mio-white)"><span class="num">700</span></div>
    <div class="step dark" style="background:#25252A"><span class="num">800</span></div>
    <div class="step dark" style="background:#131316"><span class="num">900</span></div>
  </div>
</div>
</body></html>
